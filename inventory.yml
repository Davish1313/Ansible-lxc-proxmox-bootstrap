---
- name: Generate host inventory reports
  hosts: lxcs
  gather_facts: true
  pre_tasks:
    - name: Verify SSH connectivity to all hosts
      ansible.builtin.ping:
      tags: always

    - name: Display target host info
      ansible.builtin.debug:
        msg: "Target: {{ inventory_hostname }} ({{ ansible_host }}:{{ ansible_port }})"
      tags: always

  roles:
    - role: inventory
      tags: [inventory]
