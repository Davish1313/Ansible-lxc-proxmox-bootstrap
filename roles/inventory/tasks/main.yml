---
- name: Create inventory output directory
  ansible.builtin.file:
    path: "{{ inventory_output_dir }}"
    state: directory
    mode: "0755"
  tags:
    - always

- name: Gather package facts
  ansible.builtin.package_facts:
  tags:
    - always

- name: Get running services
  ansible.builtin.command: systemctl list-units --type=service --state=running --no-pager --no-legend
  register: inventory_running_services
  changed_when: false
  tags:
    - always
  vars:
    ansible_no_log: false
  # noqa: command-instead-of-module

- name: Get open ports via ss
  ansible.builtin.command: ss -tlnp
  register: inventory_open_ports_ss
  changed_when: false
  failed_when: false
  tags:
    - always

- name: Get open ports via netstat (fallback)
  ansible.builtin.command: netstat -tlnp
  register: inventory_open_ports_netstat
  changed_when: false
  failed_when: false
  tags:
    - always

- name: Parse open ports
  ansible.builtin.set_fact:
    inventory_open_ports_raw:
      stdout_lines: "{{ (inventory_open_ports_ss.stdout_lines | default([]))
        | difference([''])
        | select('match', '^LISTEN')
        | map('split')
        | map(attribute=3)
        | list }}"
  tags:
    - always

- name: Get users
  ansible.builtin.command: getent passwd
  register: inventory_users_raw
  changed_when: false
  tags:
    - always

- name: Get disk usage
  ansible.builtin.command: df -h --output=source,size,used,avail,pcent,target
  register: inventory_disk_usage
  changed_when: false
  tags:
    - always

- name: Get network interfaces
  ansible.builtin.command: ip -o addr show
  register: inventory_network_interfaces
  changed_when: false
  tags:
    - always

- name: Get DNS servers
  ansible.builtin.command: grep nameserver /etc/resolv.conf
  register: inventory_dns_servers
  changed_when: false
  tags:
    - always

- name: Get default gateway
  ansible.builtin.command: ip route show default
  register: inventory_default_gateway
  changed_when: false
  tags:
    - always

- name: Generate host inventory report
  ansible.builtin.template:
    src: host_report.yml.j2
    dest: "{{ inventory_output_dir }}/{{ inventory_hostname }}.yml"
    mode: "0644"
  tags:
    - always

- name: Fetch inventory report to local
  ansible.builtin.fetch:
    src: "{{ inventory_output_dir }}/{{ inventory_hostname }}.yml"
    dest: "{{ inventory_output_dir }}/{{ inventory_hostname }}.yml"
    flat: true
  tags:
    - always
