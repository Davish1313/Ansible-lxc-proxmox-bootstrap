---
- name: Create /opt/scripts directory for custom scripts deployment
  ansible.builtin.file:
    path: /opt/scripts
    state: directory
    mode: "0755"
  tags: copy_files

- name: Deploy files to target hosts
  ansible.builtin.copy:
    src: "files/{{ item.src }}"
    dest: "/opt/scripts/{{ item.src }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: "test.sh", mode: "0755" }
    - { src: "test.txt", mode: "0644" }
  tags: copy_files
