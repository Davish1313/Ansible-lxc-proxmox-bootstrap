---
- name: Install essential system packages via APT (curl, btop, git)
  ansible.builtin.apt:
    name: "{{ packages_essential_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  register: packages_apt_result
  tags: packages

- name: Show installed packages
  ansible.builtin.debug:
    msg: "Installed package: {{ item }}"
  loop: "{{ packages_apt_result.results | selectattr('changed', 'equalto', true) | map(attribute='item') | list }}"
  changed_when: false
  when: packages_apt_result.results | selectattr('changed', 'equalto', true) | list | length > 0
