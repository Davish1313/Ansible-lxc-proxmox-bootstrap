---
- name: Deploy Alloy config
  ansible.builtin.template:
    src: config.alloy.j2
    dest: "{{ alloy_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart alloy

- name: Deploy Alloy defaults (disable reporting)
  ansible.builtin.template:
    src: alloy-defaults.j2
    dest: "{{ alloy_defaults_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart alloy

- name: Validate Alloy config
  ansible.builtin.command: alloy validate {{ alloy_config_path }}
  changed_when: false
  register: alloy_validate
  failed_when: alloy_validate.rc != 0 and alloy_fail_on_invalid | default(false)
