---
- name: Check if xtop is already installed by verifying binary exists
  ansible.builtin.stat:
    path: /usr/bin/xtop
  register: xtop_binary
  changed_when: false
  tags: install_xtop

- name: Download xtop deb package
  ansible.builtin.get_url:
    url: "{{ git_source_install_xtop_deb_url }}"
    dest: /tmp/xtop_{{ git_source_install_xtop_version }}.deb
    checksum: "{{ git_source_install_xtop_deb_checksum }}"
    mode: "0644"
  when: git_source_install_xtop_installed_version.rc != 0 or git_source_install_xtop_installed_version.stdout != git_source_install_xtop_version
  tags: install_xtop

- name: Install xtop from local deb
  ansible.builtin.apt:
    deb: "/tmp/xtop_{{ git_source_install_xtop_version }}.deb"
    state: present
  when: git_source_install_xtop_installed_version.rc != 0 or git_source_install_xtop_installed_version.stdout != git_source_install_xtop_version
  tags: install_xtop

- name: Remove downloaded deb package
  ansible.builtin.file:
    path: "/tmp/xtop_{{ git_source_install_xtop_version }}.deb"
    state: absent
  tags: install_xtop

- name: Verify xtop installation by checking version output
  ansible.builtin.command: xtop --version
  register: git_source_install_xtop_installed_version_check
  changed_when: false
  failed_when: false
  tags: install_xtop

- name: Display installed xtop version
  ansible.builtin.debug:
    msg: "xtop version installed: {{ git_source_install_xtop_installed_version_check.stdout }}"
  tags: install_xtop
