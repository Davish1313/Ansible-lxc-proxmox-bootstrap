- name: Update_cache
  apt:
    update_cache: true
    cache_valid_time: 3600
  register: system_update_result
  tags:
    - update
    - system_update
- name: Upgrade_packages
  apt:
    upgrade: safe
    autoremove: true
    autoclean: true
  register: system_update_upgrade_result
  notify:
    - Mostrar paquetes actualizados
  tags:
    - upgrade
    - system_update

