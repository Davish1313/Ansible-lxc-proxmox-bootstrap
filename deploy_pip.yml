---
- name: Bootstrap Python3 and pip on LXC containers
  hosts: "{{ target_hosts | default('lxcs') }}"
  gather_facts: false
  become: true
  pre_tasks:
    - name: Check if Python3 is installed
      ansible.builtin.raw: test -x /usr/bin/python3
      register: python_check
      changed_when: false
      failed_when: false

    - name: Bootstrap Python3 via raw (tries apt/dnf/apk)
      ansible.builtin.raw: |
        if command -v python3 >/dev/null 2>&1; then exit 0; fi
        if command -v apt-get >/dev/null 2>&1; then apt-get update -qq && apt-get install -y -qq python3 python3-pip; exit $?; fi
        if command -v dnf >/dev/null 2>&1; then dnf install -y python3 python3-pip; exit $?; fi
        if command -v apk >/dev/null 2>&1; then apk add python3 py3-pip; exit $?; fi
        echo "No supported package manager found" && exit 1
      when: python_check.rc != 0
      changed_when: false

    - name: Gather facts now that Python is available
      ansible.builtin.setup:
  roles:
    - role: pip
      tags: [pip]
